backend:
  name: github
  repo: incisionlabs/test-team-website
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Company Information"
        name: "settings"
        file: "_data/settings.yml"
        fields:
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - { label: "Twitter URL", name: "twitter", widget: "string", required: false }
          - { label: "GitHub URL", name: "github", widget: "string", required: false }
 
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Categories", name: "categories", widget: "list", required: false }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }

  - name: "solutions"
    label: "Solutions"
    folder: "_solutions"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Weight", name: "weight", widget: "number", default: 1, hint: "Order on page (lower = first)" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "default" }

  - name: "team"
    label: "Team Members"
    folder: "_team"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Name", name: "title", widget: "string" }
      - { label: "Position", name: "position", widget: "string" }
      - { label: "Photo", name: "image", widget: "image", required: false }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
      - { label: "Bio", name: "bio", widget: "text", required: false }
      - { label: "Weight", name: "weight", widget: "number", default: 1, hint: "Display order" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "team" }

  - name: "about"
    label: "About Page"
    files:
      - label: "About Content"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string", required: false, hint: "Main page heading" }
          - { label: "Subheading", name: "subheading", widget: "text", required: false }
          - { label: "Mission Title", name: "mission_title", widget: "string", default: "Our Mission" }
          - { label: "Mission Text", name: "mission_text", widget: "markdown" }
          - { label: "Vision Title", name: "vision_title", widget: "string", default: "Our Vision" }
          - { label: "Vision Text", name: "vision_text", widget: "markdown" }
          - { label: "Values Title", name: "values_title", widget: "string", default: "Our Values" }
          - { label: "Values", name: "values", widget: "list", fields: [
              { label: "Value", name: "name", widget: "string" },
              { label: "Description", name: "description", widget: "text" }
            ]}
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
