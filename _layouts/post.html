---
layout: default
---
<div class="post-container">
    <article class="post-detail">
        {% if page.image %}
        <div class="post-hero">
            <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
        </div>
        {% endif %}

        <div class="post-meta">{{ page.date | date: "%B %d, %Y" }} · {{ page.categories | join: " · " | capitalize }}</div>
        <h1>{{ page.title }}</h1>
        <div class="post-content">
            {{ content }}
        </div>

        <div class="post-navigation">
            <a href="{{ '/blog' | relative_url }}" class="back-link">&larr; Back to Blog</a>
        </div>
    </article>
</div>
